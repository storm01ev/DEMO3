<!DOCTYPE html>
<html>
<head><title>Вход в систему ООО Обувь</title></head>
<body style="font-family: Arial; max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ccc;">
    <h2>Авторизация</h2>
    {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    
    <form method="POST">
        <label>Логин:</label><br>
        <input type="text" name="login" style="width: 100%; margin-bottom: 10px;"><br>
        <label>Пароль:</label><br>
        <input type="password" name="password" style="width: 100%; margin-bottom: 20px;"><br>
        <button type="submit" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none;">Войти</button>
        <hr>
        <button type="submit" name="guest" style="width: 100%; padding: 10px; background: #6c757d; color: white; border: none;">Войти как гость</button>
    </form>
</body>
</html>
